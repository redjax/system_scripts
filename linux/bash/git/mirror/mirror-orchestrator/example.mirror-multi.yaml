---
# Example mirror-multi YAML jobs file (simplified format)
# Use with: mirror-multi --jobs-yaml example.mirror-multi.yaml
#
# Simple format: src + list of destinations
# Supports: "local" for local mirror, or remote URLs for sync/replicate
# Operation is inferred from destinations:
#   - push: [local]              -> mirror locally
#   - push: [local, remote1, ..] -> mirror locally + push to remotes
#   - push: [remote1]            -> sync to single remote
#   - push: [remote1, remote2]   -> replicate to multiple remotes

jobs:
  - src: git@github.com:redjax/dotfiles
    local: true
    push:
      - git@gitlab.com:redjax/dotfiles

  - src: https://github.com:octocat/Hello-World
    local: true

  - src: git@github.com:my-org/important-repo
    push:
      - git@gitlab.com:my-org/important-repo
      - git@codeberg.org:my-org/important-repo
