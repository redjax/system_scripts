# Example mirror-multi configuration file (INI format)
# Use with: mirror-multi --config example.mirror-multi.conf

[mirror-multi]
# Number of concurrent jobs
parallel=4

# Number of retries after first failure
retries=2

# Seconds to wait between retries
retry-delay=5

# Path to jobs file (text format, one job per line)
# jobs-file=./jobs

# Path to YAML-formatted jobs file (alternative to jobs-file)
# jobs-yaml=./example.mirror-multi.yaml

# Directory for logs and status files
log-dir=./logs

# Auto-delete logs and status files older than this many days
log-retention-days=30

# Lock file for preventing concurrent runs
lock-file=/tmp/mirror-multi.lock

# Path to mirror-git-repo script
mirror-script=./mirror-git-repo
